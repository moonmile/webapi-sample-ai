openapi: 3.0.3
info:
  title: Sushi Serving System API
  description: Laravel-based REST API for the sushi serving system.
  version: 1.0.0
servers:
  - url: http://localhost:8000/api
    description: Local development

tags:
  - name: seats
    description: Table seats
  - name: orders
    description: Orders
  - name: order-history
    description: Order history
  - name: products
    description: Products
  - name: categories
    description: Categories
  - name: product-categories
    description: Product-category relations
  - name: product-stock
    description: Product stock

paths:
  /seats:
    get:
      tags: [seats]
      summary: List seats
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Seat'
    post:
      tags: [seats]
      summary: Create seat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeatCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Seat'
        '422':
          $ref: '#/components/responses/ValidationError'
  /seats/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [seats]
      summary: Get seat
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Seat'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [seats]
      summary: Update seat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeatUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Seat'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [seats]
      summary: Delete seat
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'

  /orders:
    get:
      tags: [orders]
      summary: List orders
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
    post:
      tags: [orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '422':
          $ref: '#/components/responses/ValidationError'
  /orders/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [orders]
      summary: Get order
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [orders]
      summary: Update order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Order'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [orders]
      summary: Delete order
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'

  /order-history:
    get:
      tags: [order-history]
      summary: List order history
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderHistory'
  /order-history/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [order-history]
      summary: Get order history entry
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/OrderHistory'
        '404':
          $ref: '#/components/responses/NotFound'

  /products:
    get:
      tags: [products]
      summary: List products
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
    post:
      tags: [products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
        '422':
          $ref: '#/components/responses/ValidationError'
  /products/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [products]
      summary: Get product
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [products]
      summary: Update product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Product'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [products]
      summary: Delete product
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'

  /categories:
    get:
      tags: [categories]
      summary: List categories
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Category'
    post:
      tags: [categories]
      summary: Create category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryCreateRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
        '422':
          $ref: '#/components/responses/ValidationError'
  /categories/{id}:
    parameters:
      - $ref: '#/components/parameters/IdPath'
    get:
      tags: [categories]
      summary: Get category
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [categories]
      summary: Update category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryUpdateRequest'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Category'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [categories]
      summary: Delete category
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'

  /product-categories:
    get:
      tags: [product-categories]
      summary: List product-category relations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductCategory'
    post:
      tags: [product-categories]
      summary: Link product to category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCategory'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductCategory'
        '422':
          $ref: '#/components/responses/ValidationError'
  /product-categories/{productId}/{categoryId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
      - name: categoryId
        in: path
        required: true
        schema:
          type: integer
    delete:
      tags: [product-categories]
      summary: Unlink product from category
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'

  /product-stock:
    get:
      tags: [product-stock]
      summary: List product stock
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductStock'
    post:
      tags: [product-stock]
      summary: Set product stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductStock'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductStock'
        '422':
          $ref: '#/components/responses/ValidationError'
  /product-stock/{productId}:
    parameters:
      - name: productId
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [product-stock]
      summary: Get product stock
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductStock'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [product-stock]
      summary: Update product stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductStock'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/ProductStock'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      tags: [product-stock]
      summary: Delete product stock entry
      responses:
        '204':
          description: No Content
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
  responses:
    NotFound:
      description: Resource not found
    ValidationError:
      description: Validation error
  schemas:
    Seat:
      type: object
      properties:
        id:
          type: integer
        table_number:
          type: integer
        status:
          type: string
          enum: [available, occupied]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SeatCreateRequest:
      type: object
      required: [table_number]
      properties:
        table_number:
          type: integer
        status:
          type: string
          enum: [available, occupied]
    SeatUpdateRequest:
      type: object
      properties:
        table_number:
          type: integer
        status:
          type: string
          enum: [available, occupied]

    Order:
      type: object
      properties:
        id:
          type: integer
        seat_id:
          type: integer
        sushi_type:
          type: string
          maxLength: 100
        quantity:
          type: integer
        status:
          type: string
          enum: [pending, in_progress, completed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OrderCreateRequest:
      type: object
      required: [seat_id, sushi_type, quantity]
      properties:
        seat_id:
          type: integer
        sushi_type:
          type: string
          maxLength: 100
        quantity:
          type: integer
        status:
          type: string
          enum: [pending, in_progress, completed]
    OrderUpdateRequest:
      type: object
      properties:
        seat_id:
          type: integer
        sushi_type:
          type: string
          maxLength: 100
        quantity:
          type: integer
        status:
          type: string
          enum: [pending, in_progress, completed]

    OrderHistory:
      type: object
      properties:
        id:
          type: integer
        order_id:
          type: integer
        seat_id:
          type: integer
        sushi_type:
          type: string
          maxLength: 100
        quantity:
          type: integer
        status:
          type: string
          enum: [pending, in_progress, completed]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 100
        price:
          type: number
          format: double
        description:
          type: string
          nullable: true
        image_url:
          type: string
          maxLength: 100
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ProductCreateRequest:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
          maxLength: 100
        price:
          type: number
          format: double
        description:
          type: string
          nullable: true
        image_url:
          type: string
          maxLength: 100
          nullable: true
    ProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        price:
          type: number
          format: double
        description:
          type: string
          nullable: true
        image_url:
          type: string
          maxLength: 100
          nullable: true

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CategoryCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
    CategoryUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true

    ProductCategory:
      type: object
      properties:
        product_id:
          type: integer
        category_id:
          type: integer

    ProductStock:
      type: object
      properties:
        product_id:
          type: integer
        quantity:
          type: integer
